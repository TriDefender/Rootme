<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rootme 漏洞页面</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12 url("https://t.alcy.cc/ycy") center/cover no-repeat fixed;
      color: #f0f0f0;
      position: relative;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* --- 卡片 --- */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      background: linear-gradient(
        160deg,
        rgba(255,255,255,.10) 0%,
        rgba(255,255,255,.04) 40%,
        rgba(255,255,255,.07) 100%
      );
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 8px 40px rgba(0,0,0,.4),
        0 1.5px 0 rgba(255,255,255,.08) inset;
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 1.5px 0 rgba(255,255,255,.08) inset; }
      50%      { box-shadow: 0 12px 48px rgba(99,102,241,.18), 0 1.5px 0 rgba(255,255,255,.1) inset; }
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: .02em;
      background: linear-gradient(135deg, #fff 20%, #c7d2fe 60%, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      margin: 0 0 28px;
      font-size: .9rem;
      line-height: 1.6;
      color: rgba(255,255,255,.55);
    }
    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #e0e0ff;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      letter-spacing: .02em;
      box-shadow: 0 4px 18px rgba(0,0,0,.25), 0 1px 0 rgba(255,255,255,.1) inset;
      transition: all .3s cubic-bezier(.4,0,.2,1);
    }
    a.button:hover {
      background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1));
      border-color: rgba(255,255,255,.28);
      box-shadow: 0 8px 28px rgba(99,102,241,.3), 0 1px 0 rgba(255,255,255,.15) inset;
      transform: translateY(-3px);
      color: #fff;
    }
    a.button:active {
      transform: translateY(0) scale(.98);
      box-shadow: 0 2px 10px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.08) inset;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="content">
    <h1>Rootme 漏洞入口</h1>
    <p>一切漏洞只能用于学习和研究，不能用于任何非法活动。</p>
    <a class="button" href="/lonStack/CVE-2026-43499/">安卓Firefox网页提权root漏洞 (lonStack-CVE-2026-43499)</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.js"></script>
  <script>
    NProgress.configure({ showSpinner: false });
    NProgress.start();
    document.addEventListener('DOMContentLoaded', () => {
      NProgress.set(0.4);
    });
    window.addEventListener('load', () => {
      NProgress.done();
    });
  </script>
</body>
</html>
